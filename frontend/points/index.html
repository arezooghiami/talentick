<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>باشگاه امتیازات — Talentick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/employee.css?v=20260720a" />
</head>
<body>

  <nav class="emp-navbar">
    <a href="/onboarding/index.html" class="emp-brand"><span class="logo-dot"></span>Talenti<span class="accent">ck</span></a>
    <div class="emp-nav-links">
      <a href="/onboarding/index.html" data-nav="home">🏠 خانه</a>
      <a href="/content/list.html" data-nav="content">📚 محتوای من</a>
      <a href="/organization/index.html" data-nav="organization">🏢 سازمان</a>
      <a href="/tickets/index.html" data-nav="tickets">🎫 تیکت‌های من</a>
      <a href="/points/index.html" data-nav="points">🏆 باشگاه امتیازات</a>
    </div>
    <div class="emp-nav-right">
      <button type="button" class="emp-search-trigger" id="cmdkTrigger">
        🔍 <span class="label">جست‌وجو یا رفتن به...</span> <kbd>⌘K</kbd>
      </button>
      <div class="emp-user-menu">
        <button class="emp-user-btn" id="empUserBtn">
          <span class="emp-user-avatar" id="empUserAvatar">—</span>
          <span class="emp-user-name" id="empUserName">—</span>
        </button>
        <div class="emp-user-dropdown" id="empUserDropdown">
          <a href="/change-password.html">🔒 تغییر رمز عبور</a>
          <hr>
          <button class="danger" onclick="EmployeeShell.logout()">🚪 خروج از حساب</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="emp-page" style="max-width:1000px;">
    <div class="points-hero">
      <div class="points-hero-icon">🏆</div>
      <div class="points-hero-value" id="ptTotal">—</div>
      <div class="points-hero-label">موجودی فعلی امتیاز شما</div>
      <p class="points-hero-desc">با تکمیل محتوا، قبولی در آزمون‌ها و پیشرفت در برنامه‌های آشنایی، امتیاز کسب کنید و در فروشگاه جایزه خرج کنید.</p>
    </div>

    <div class="wallet-stats-grid" id="ptWalletStats"></div>

    <div class="org-tabs" id="ptTabs">
      <button class="org-tab-btn active" data-pt-tab="history" onclick="MyPointsPage.switchTab('history')">📜 تاریخچه</button>
      <button class="org-tab-btn" data-pt-tab="catalog" onclick="MyPointsPage.switchTab('catalog')">🎁 فروشگاه جایزه</button>
      <button class="org-tab-btn" data-pt-tab="redemptions" onclick="MyPointsPage.switchTab('redemptions')">📦 درخواست‌های من</button>
    </div>

    <div class="org-tab-panel active" id="pt-tab-history">
      <div class="item-list" id="ptHistory">
        <div class="emp-skeleton" style="height:60px;"></div>
        <div class="emp-skeleton" style="height:60px;"></div>
        <div class="emp-skeleton" style="height:60px;"></div>
      </div>
      <div class="emp-pagination" id="ptPagination"></div>
    </div>

    <div class="org-tab-panel" id="pt-tab-catalog">
      <div class="emp-filters" style="margin-bottom:20px;">
        <div class="emp-search-box">
          <input type="text" id="ptCatalogSearch" placeholder="جست‌وجوی جایزه..." oninput="MyPointsPage.debouncedCatalogSearch()">
        </div>
      </div>
      <div class="content-grid" id="ptCatalogGrid"></div>
      <div class="emp-pagination" id="ptCatalogPagination"></div>
    </div>

    <div class="org-tab-panel" id="pt-tab-redemptions">
      <div class="item-list" id="ptRedemptions">
        <div class="emp-skeleton" style="height:70px;"></div>
        <div class="emp-skeleton" style="height:70px;"></div>
      </div>
      <div class="emp-pagination" id="ptRedemptionsPagination"></div>
    </div>
  </main>

  <script src="../assets/js/config.js?v=20260720a"></script>
  <script src="../assets/js/auth.js?v=20260720a"></script>
  <script src="../assets/js/api.js?v=20260720a"></script>
  <script src="../assets/js/utils.js?v=20260720a"></script>
  <script src="../assets/js/employee_shell.js?v=20260720a"></script>
  <script src="../assets/js/command_palette.js?v=20260720a"></script>
  <script src="../assets/js/points.js?v=20260720a"></script>
  <script>
    EmployeeShell.init('points');
    MyPointsPage.load();
  </script>
</body>
</html>
