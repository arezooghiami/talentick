<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود به Talentick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─────────────────────────────────────────── */
    :root {
      --primary:        #6366F1;
      --primary-dark:   #4F46E5;
      --primary-light:  #EEF2FF;
      --danger:         #EF4444;
      --gray-50:        #F9FAFB;
      --gray-100:       #F3F4F6;
      --gray-200:       #E5E7EB;
      --gray-400:       #9CA3AF;
      --gray-500:       #6B7280;
      --gray-700:       #374151;
      --gray-800:       #1F2937;
      --radius-md:      10px;
      --radius-lg:      16px;
      --transition:     .2s ease;
      --shadow-lg:      0 20px 60px rgba(99,102,241,.18);
    }

    /* ─── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Login Card ─────────────────────────────────────────────── */
    .login-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    /* ─── Logo ───────────────────────────────────────────────────── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--gray-800);
    }

    .logo-sub {
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 6px;
    }

    /* ─── Form ───────────────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-700);
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 14px;
      color: var(--gray-800);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      background: var(--gray-50);
    }

    .form-control:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    .form-control.is-error { border-color: var(--danger); }

    /* ─── Submit Button ───────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-login:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-login:active:not(:disabled) { transform: scale(.98); }
    .btn-login:disabled { opacity: .65; cursor: not-allowed; }

    /* ─── Spinner ─────────────────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: inline-block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Error Alert ─────────────────────────────────────────────── */
    .alert-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 13px;
      color: #DC2626;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert-error.show { display: flex; }

    /* ─── Footer ──────────────────────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--gray-400);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-text">Talenti<span>ck</span></div>
      <div class="logo-sub">پلتفرم یادگیری و آنبوردینگ سازمانی</div>
    </div>

    <!-- Error Alert -->
    <div class="alert-error" id="alertError" role="alert">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span id="alertText">خطایی رخ داده است</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">ایمیل</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="example@company.ir"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">رمز عبور</label>
        <input
          id="password"
          type="password"
          class="form-control"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">ورود به سامانه</span>
      </button>
    </form>

    <div class="login-footer">Talentick v0 &nbsp;·&nbsp; محرمانه</div>
  </div>

  <script>
    /**
     * Talentick — Login Page Script
     * ================================
     * وظایف:
     * 1. اگر کاربر قبلاً login کرده باشد → redirect فوری
     * 2. POST به /api/auth/login
     * 3. ذخیره JWT در localStorage
     * 4. Redirect بر اساس role کاربر
     *
     * نقشه Redirect:
     *   super_admin  → /admin/index.html  (شِل واحد — منوی کامل، بدون فیلتر سازمانی)
     *   org_admin    → /admin/index.html  (همان شِل — محدود به سازمان خودش)
     *   manager      → /admin/index.html  (همان شِل — محدود به سازمان خودش)
     *   employee     → /onboarding.html
     */

    // ─── Constants ──────────────────────────────────────────────────
    const API_BASE    = '';          // همان origin — backend روی همین port
    const TOKEN_KEY   = 'talentick_token';
    const USER_KEY    = 'talentick_user';

    /** نقشه role → URL هدایت */
    const ROLE_REDIRECT = {
      super_admin : '/admin/index.html',
      org_admin   : '/admin/index.html',
      manager     : '/admin/index.html',
      employee    : '/onboarding.html',
    };
    const ERROR_MESSAGES = {
      "Invalid credentials": "ایمیل یا رمز عبور اشتباه است",
      "User not found": "کاربر پیدا نشد",
      "Inactive user": "حساب کاربری غیرفعال است",
    };

    // ─── On Load: بررسی token موجود ─────────────────────────────────
    (function checkExistingSession() {
      const token = localStorage.getItem(TOKEN_KEY);
      const user  = _parseUser();
      if (token && user?.role) {
        // token داریم → کاربر احتمالاً login است — مستقیم redirect
        const dest = ROLE_REDIRECT[user.role] || '/onboarding.html';
        window.location.replace(dest);
      }
    })();

    // ─── DOM ────────────────────────────────────────────────────────
    const form      = document.getElementById('loginForm');
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const btnLogin  = document.getElementById('btnLogin');
    const alertEl   = document.getElementById('alertError');
    const alertText = document.getElementById('alertText');

    // ─── Form Submit ─────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      _clearError();

      const email    = emailEl.value.trim();
      const password = passEl.value;

      // Validation ساده
      if (!email || !password) {
        _showError('ایمیل و رمز عبور را وارد کنید');
        return;
      }

      _setLoading(true);

      try {
        const data = await _loginRequest(email, password);
        _saveSession(data);
        _redirectByRole(data.role);
      } catch (err) {
        _showError(err.message || 'خطا در ارتباط با سرور');
        emailEl.classList.add('is-error');
        passEl.classList.add('is-error');
      } finally {
        _setLoading(false);
      }
    });

    // ─── Helpers ─────────────────────────────────────────────────────

    /**
     * POST /api/auth/login
     * @returns {Promise<{access_token, role, full_name, org_id, user_id}>}
     */
    async function _loginRequest(email, password) {

  const formData = new URLSearchParams();
  formData.append('username', email); // FastAPI انتظار username دارد
  formData.append('password', password);

  const res = await fetch(`${API_BASE}/api/auth/login`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
    },
    body: formData,
  });

  const body = await res.json();

  if (!res.ok) {
    const rawError = body?.detail;

        const msg =
          ERROR_MESSAGES[rawError] ||
          'خطا در ورود به سیستم';

        throw new Error(msg);
      }

  return body;
}

    /**
     * ذخیره token و اطلاعات کاربر در localStorage.
     * هرگز رمز عبور را ذخیره نکن.
     */
    function _saveSession(data) {
      localStorage.setItem(TOKEN_KEY, data.access_token);
      localStorage.setItem(USER_KEY, JSON.stringify({
        user_id  : data.user_id,
        org_id   : data.org_id,
        role     : data.role,
        full_name: data.full_name,
      }));
    }

    /**
     * بر اساس role کاربر به صفحه مناسب هدایت می‌کند.
     * اگر role ناشناخته بود → onboarding (امن‌ترین انتخاب)
     */
    function _redirectByRole(role) {
      const dest = ROLE_REDIRECT[role] || '/onboarding.html';
      window.location.replace(dest);
    }

    /** اطلاعات کاربر ذخیره‌شده را parse می‌کند. */
    function _parseUser() {
      try {
        return JSON.parse(localStorage.getItem(USER_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function _setLoading(loading) {
      btnLogin.disabled = loading;
      btnLogin.classList.toggle('loading', loading);
    }

    function _showError(msg) {
      alertText.textContent = msg;
      alertEl.classList.add('show');
    }

    function _clearError() {
      alertEl.classList.remove('show');
      emailEl.classList.remove('is-error');
      passEl.classList.remove('is-error');
    }
  </script>
</body>
</html>
