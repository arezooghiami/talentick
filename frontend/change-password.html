<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تغییر رمز عبور — Talentick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/admin.css?v=20260715" />
  <style>
    body {
      background: linear-gradient(135deg, #6C4CF1 0%, #5636D6 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .cp-card {
      width: 100%; max-width: 440px; background: var(--card-bg); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); padding: 40px 36px;
    }
    .cp-icon {
      width: 52px; height: 52px; border-radius: 14px; background: var(--primary-light);
      color: var(--primary); display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px; font-size: 22px;
    }
    .cp-title { font-size: 20px; font-weight: 800; color: var(--gray-800); margin-bottom: 6px; }
    .cp-desc { font-size: 13px; color: var(--gray-500); line-height: 1.8; margin-bottom: 24px; }
    .cp-banner-forced {
      background: #FFFBEB; border: 1px solid #FDE68A; color: #92400E; border-radius: var(--radius-md);
      padding: 12px 14px; font-size: 12.5px; line-height: 1.8; margin-bottom: 22px; display: flex; gap: 8px;
    }
    .alert-error {
      background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius-md);
      padding: 12px 14px; font-size: 13px; color: #DC2626; margin-bottom: 18px; display: none; align-items: center; gap: 8px;
    }
    .alert-error.show { display: flex; }
    .btn-submit {
      width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none;
      border-radius: var(--radius-md); font-family: 'Vazirmatn', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px;
      transition: background var(--transition);
    }
    .btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; }
    .btn-submit .spinner { display: none; }
    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { display: none; }
    .cp-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
    .cp-back { text-align: center; margin-top: 18px; }
    .cp-back a { font-size: 12.5px; color: var(--gray-500); }
    .cp-back a:hover { color: var(--primary); }
    .pw-strength { display: flex; gap: 4px; margin-top: 8px; }
    .pw-strength span { flex: 1; height: 4px; border-radius: 2px; background: var(--gray-200); transition: background .2s; }
  </style>
</head>
<body>

  <div class="cp-card">
    <div class="cp-icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>
    <div class="cp-title">تغییر رمز عبور</div>
    <div class="cp-desc" id="cpDesc">برای امنیت حساب خود، رمز عبور فعلی و رمز جدید را وارد کنید.</div>

    <div class="cp-banner-forced hidden" id="forcedBanner">
      <span>🔒</span>
      <span>رمز عبور فعلی شما توسط مدیر سیستم تنظیم شده است. قبل از دسترسی به سایر بخش‌های سامانه، باید یک رمز عبور جدید و شخصی انتخاب کنید.</span>
    </div>

    <div class="alert-error" id="alertError"><span id="alertText"></span></div>

    <form id="cpForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="currentPassword">رمز عبور فعلی</label>
        <input id="currentPassword" type="password" class="form-control" autocomplete="current-password" dir="ltr" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="newPassword">رمز عبور جدید</label>
        <input id="newPassword" type="password" class="form-control" autocomplete="new-password" dir="ltr" required minlength="8" />
        <div class="pw-strength"><span></span><span></span><span></span><span></span></div>
        <div class="cp-hint">حداقل ۸ کاراکتر — ترکیبی از حروف و عدد پیشنهاد می‌شود</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">تکرار رمز عبور جدید</label>
        <input id="confirmPassword" type="password" class="form-control" autocomplete="new-password" dir="ltr" required minlength="8" />
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">
        <div class="spinner"></div>
        <span class="btn-text">تغییر رمز عبور</span>
      </button>
    </form>

    <div class="cp-back" id="backLinkWrap">
      <a href="#" id="backLink">بازگشت</a>
    </div>
  </div>

  <script src="assets/js/config.js?v=20260715"></script>
  <script src="assets/js/auth.js?v=20260715"></script>
  <script src="assets/js/api.js?v=20260715"></script>
  <script>
    Auth.requireAuth([], { allowGatedPassword: true });

    const user = Auth.getUser();
    const isForced = !!user?.must_change_password;

    if (isForced) {
      document.getElementById('forcedBanner').classList.remove('hidden');
      document.getElementById('cpDesc').classList.add('hidden');
      document.getElementById('backLinkWrap').classList.add('hidden');
    } else {
      document.getElementById('backLink').addEventListener('click', (e) => {
        e.preventDefault();
        Auth.redirectByRole();
      });
    }

    const form = document.getElementById('cpForm');
    const currentEl = document.getElementById('currentPassword');
    const newEl = document.getElementById('newPassword');
    const confirmEl = document.getElementById('confirmPassword');
    const btn = document.getElementById('btnSubmit');
    const alertEl = document.getElementById('alertError');
    const alertText = document.getElementById('alertText');
    const strengthBars = document.querySelectorAll('.pw-strength span');

    newEl.addEventListener('input', () => {
      const v = newEl.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const colors = ['#EF4444', '#F59E0B', '#3B82F6', '#10B981'];
      strengthBars.forEach((bar, i) => {
        bar.style.background = i < score ? colors[score - 1] : 'var(--gray-200)';
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      _clearError();

      if (newEl.value.length < 8) { _showError('رمز عبور جدید باید حداقل ۸ کاراکتر باشد'); return; }
      if (newEl.value !== confirmEl.value) { _showError('رمز عبور جدید و تکرار آن یکسان نیستند'); return; }
      if (newEl.value === currentEl.value) { _showError('رمز عبور جدید باید متفاوت از رمز فعلی باشد'); return; }

      _setLoading(true);
      try {
        const data = await api.post('/auth/change-password', {
          current_password: currentEl.value,
          new_password: newEl.value,
        });
        Auth.setSession(data);
        toastSuccessSafe('رمز عبور با موفقیت تغییر کرد');
        Auth.redirectByRole();
      } catch (err) {
        _showError(err.message || 'خطا در تغییر رمز عبور');
      } finally {
        _setLoading(false);
      }
    });

    function toastSuccessSafe(msg) {
      // utils.js در این صفحه لود نشده (سبک نگه داشتن صفحه) — fallback ساده
      try { if (typeof toastSuccess === 'function') toastSuccess(msg); } catch { /* ignore */ }
    }
    function _setLoading(loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }
    function _showError(msg) {
      alertText.textContent = msg;
      alertEl.classList.add('show');
    }
    function _clearError() {
      alertEl.classList.remove('show');
    }
  </script>
</body>
</html>
