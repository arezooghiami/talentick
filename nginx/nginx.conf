# =============================================================================
# Talentick — Nginx Reverse Proxy + Static Frontend
# =============================================================================
# نقش این کانفیگ:
#   1. سرو مستقیم فایل‌های استاتیک فرانت (./frontend → /usr/share/nginx/html)
#   2. پراکسی کردن مسیرهای /api/* به سرویس FastAPI (app:8000) در شبکه داخلی
#      Docker Compose — نام سرویس «app» طبق docker-compose.yml.
#
# توجه: uvicorn خودش هم (در app/main.py) قابلیت سرو مستقیم فرانت را دارد؛
# این نگین‌ایکس صرفاً به‌عنوان لایه‌ی reverse-proxy/edge روی پورت ۸۰ عمل
# می‌کند تا در production بشود کش/فشرده‌سازی/TLS را به آن اضافه کرد بدون
# اینکه FastAPI worker درگیر سرو فایل استاتیک شود.

server {
    listen 80;
    server_name _;

    client_max_body_size 220m;  # هم‌راستا با MAX_FILE_SIZE_MB در core/storage.py

    # ─── Security Headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── API — پراکسی به FastAPI ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://app:8000/health;
    }

    # ─── فرانت استاتیک ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # فایل‌های Hash‌شده (js/css/تصاویر) — کش طولانی‌مدت
    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
