<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محتوای من — Talentick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/employee.css?v=20260715" />
</head>
<body>

  <nav class="emp-navbar">
    <a href="/onboarding/index.html" class="emp-brand"><span class="logo-dot"></span>Talenti<span class="accent">ck</span></a>
    <div class="emp-nav-links">
      <a href="/onboarding/index.html" data-nav="home">🏠 خانه</a>
      <a href="/content/list.html" data-nav="content">📚 محتوای من</a>
      <a href="/organization/index.html" data-nav="organization">🏢 سازمان</a>
    </div>
    <div class="emp-nav-right">
      <div class="emp-user-menu">
        <button class="emp-user-btn" id="empUserBtn">
          <span class="emp-user-avatar" id="empUserAvatar">—</span>
          <span class="emp-user-name" id="empUserName">—</span>
        </button>
        <div class="emp-user-dropdown" id="empUserDropdown">
          <a href="/change-password.html">🔒 تغییر رمز عبور</a>
          <hr>
          <button class="danger" onclick="EmployeeShell.logout()">🚪 خروج از حساب</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="emp-page">
    <div class="emp-page-header">
      <div class="emp-page-title">محتوای من</div>
      <div class="emp-page-subtitle"><span id="mcCount">—</span> — محتوایی که برای شما هدفمند شده است</div>
    </div>

    <div class="emp-filters">
      <div class="emp-search-box">
        <input type="text" id="mcSearch" placeholder="جستجو در عنوان یا توضیحات..." oninput="MyContentPage.searchDebounced()" />
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
      </div>
      <div class="emp-filter-pills">
        <button class="emp-filter-pill active" onclick="MyContentPage.setType('', this)">همه</button>
        <button class="emp-filter-pill" onclick="MyContentPage.setType('course', this)">🎓 دوره</button>
        <button class="emp-filter-pill" onclick="MyContentPage.setType('article', this)">📰 مقاله</button>
        <button class="emp-filter-pill" onclick="MyContentPage.setType('podcast', this)">🎙️ پادکست</button>
        <button class="emp-filter-pill" onclick="MyContentPage.setType('book', this)">📚 کتاب</button>
      </div>
    </div>

    <div class="content-grid" id="mcGrid"></div>
    <div class="emp-pagination" id="mcPagination"></div>
  </main>

  <script src="../assets/js/config.js?v=20260715"></script>
  <script src="../assets/js/auth.js?v=20260715"></script>
  <script src="../assets/js/api.js?v=20260715"></script>
  <script src="../assets/js/utils.js?v=20260715"></script>
  <script src="../assets/js/employee_shell.js?v=20260715"></script>
  <script src="../assets/js/content_shared.js?v=20260715"></script>
  <script src="../assets/js/my_content.js?v=20260715"></script>
  <script>
    EmployeeShell.init('content');
    MyContentPage.load();
  </script>
</body>
</html>
