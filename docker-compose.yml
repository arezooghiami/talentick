# =============================================================================
# Talentick — Docker Compose
# سرویس‌ها: PostgreSQL | MinIO | FastAPI backend | Nginx frontend
# راه‌اندازی: docker compose up --build
# =============================================================================

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-talentick}
      POSTGRES_USER:     ${POSTGRES_USER:-talentick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"           # فقط برای dev — در production حذف شود
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentick} -d ${POSTGRES_DB:-talentick}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── MinIO (S3-compatible storage) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"           # S3 API
      - "9001:9001"           # MinIO Console (web UI)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── FastAPI backend ────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # این مقادیر .env را override می‌کنند
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-talentick}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-talentick}
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app    # hot reload در dev
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info

  # ─── Nginx (frontend + reverse proxy) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

# ─── Named volumes ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data: